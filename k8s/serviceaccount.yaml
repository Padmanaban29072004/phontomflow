apiVersion: v1
kind: ServiceAccount
metadata:
  name: phantom-flow
  namespace: phantom-flow
  labels:
    app.kubernetes.io/name: phantom-flow
    app.kubernetes.io/part-of: phantom-flow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: phantom-flow-read
  namespace: phantom-flow
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: phantom-flow-read-binding
  namespace: phantom-flow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: phantom-flow-read
subjects:
  - kind: ServiceAccount
    name: phantom-flow
    namespace: phantom-flow
