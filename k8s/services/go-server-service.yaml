apiVersion: v1
kind: Service
metadata:
  name: go-server
  namespace: phantom-flow
  labels:
    app.kubernetes.io/name: phantom-flow
    app.kubernetes.io/component: go-server
spec:
  selector:
    app.kubernetes.io/component: go-server
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
  type: ClusterIP
