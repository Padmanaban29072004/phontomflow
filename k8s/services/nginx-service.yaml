apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: phantom-flow
  labels:
    app.kubernetes.io/name: phantom-flow
    app.kubernetes.io/component: nginx
spec:
  selector:
    app.kubernetes.io/component: nginx
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
    - name: https
      port: 443
      targetPort: https
      protocol: TCP
  type: LoadBalancer
