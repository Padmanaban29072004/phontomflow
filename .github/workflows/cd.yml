name: CD

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - backend
          - frontend
          - go-server
          - rust-engine
          - ml-service
          - nginx
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=ref,event=tag
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29"

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_STAGING }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Staging
        run: |
          cd k8s
          kustomize edit set image \
            ghcr.io/phantom-flow/backend=${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/frontend=${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/go-server=${{ env.REGISTRY }}/${{ github.repository }}/go-server:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/rust-engine=${{ env.REGISTRY }}/${{ github.repository }}/rust-engine:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/ml-service=${{ env.REGISTRY }}/${{ github.repository }}/ml-service:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/nginx=${{ env.REGISTRY }}/${{ github.repository }}/nginx:${{ env.IMAGE_TAG }}
          kustomize build . | kubectl apply -f -

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/backend -n phantom-flow --timeout=300s
          kubectl rollout status deployment/frontend -n phantom-flow --timeout=300s
          kubectl rollout status deployment/go-server -n phantom-flow --timeout=300s
          kubectl rollout status deployment/nginx -n phantom-flow --timeout=300s

  deploy-production:
    name: Deploy to Production
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    if: github.event_name == 'release'
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "v1.29"

      - name: Configure Kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > $HOME/.kube/config

      - name: Deploy to Production
        run: |
          cd k8s
          kustomize edit set image \
            ghcr.io/phantom-flow/backend=${{ env.REGISTRY }}/${{ github.repository }}/backend:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/frontend=${{ env.REGISTRY }}/${{ github.repository }}/frontend:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/go-server=${{ env.REGISTRY }}/${{ github.repository }}/go-server:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/rust-engine=${{ env.REGISTRY }}/${{ github.repository }}/rust-engine:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/ml-service=${{ env.REGISTRY }}/${{ github.repository }}/ml-service:${{ env.IMAGE_TAG }} \
            ghcr.io/phantom-flow/nginx=${{ env.REGISTRY }}/${{ github.repository }}/nginx:${{ env.IMAGE_TAG }}
          kustomize build . | kubectl apply -f -

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/backend -n phantom-flow --timeout=300s
          kubectl rollout status deployment/frontend -n phantom-flow --timeout=300s
          kubectl rollout status deployment/nginx -n phantom-flow --timeout=300s

      - name: Post-deploy Health Check
        run: |
          sleep 30
          curl -f https://phantom-flow.example.com/health || exit 1
