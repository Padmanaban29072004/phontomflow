input {
  # Splunk HTTP Event Collector
  http_poller {
    urls => {
      splunk_hec => {
        method => "post"
        url => "${SPLUNK_HEC_URL}"
        headers => {
          "Authorization" => "Splunk ${SPLUNK_HEC_TOKEN}"
          "Content-Type" => "application/json"
        }
        body => '{ "query": "search index=* earliest=-1m latest=now | head 1000 | table _time src_ip dest_ip user action severity raw" }'
      }
    }
    request_timeout => 60
    schedule => { every => "30s" }
    codec => "json"
    metadata_target => "http_poller_metadata"
  }

  # ELK pull (Elasticsearch)
  elasticsearch {
    hosts => [ "${ELASTICSEARCH_URL}" ]
    index => "${ELASTICSEARCH_INDEX:logs-*}"
    query => '{ "query": { "range": { "@timestamp": { "gte": "now-1m", "lte": "now" } } } }'
    schedule => "* * * * *"
    docinfo => true
  }
}

filter {
  mutate {
    add_field => {
      "source" => "%{[@metadata][input][type]}"
    }
  }

  # Normalize likely field variants before Kafka handoff
  mutate {
    rename => { "src" => "src_ip" }
    rename => { "source_ip" => "src_ip" }
    rename => { "dest_ip" => "dst_ip" }
    rename => { "destination_ip" => "dst_ip" }
    rename => { "_time" => "timestamp" }
    rename => { "@timestamp" => "timestamp" }
    rename => { "action" => "event_type" }
    rename => { "raw" => "raw_payload" }
  }
}

output {
  kafka {
    bootstrap_servers => "${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}"
    topic_id => "${KAFKA_RAW_TOPIC:phontomflow.raw.events}"
    codec => json
    acks => "all"
    compression_type => "gzip"
  }
}

